<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LOGPARSE // SYS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="zebra.css">
</head>
<body>
  <div class="scanlines" aria-hidden="true"></div>
  <div class="grid-bg"   aria-hidden="true"></div>
  <div class="corner-glow" aria-hidden="true"></div>
  <div class="scan-line" id="scanLine" aria-hidden="true"></div>

  <div class="terminal">

    <header class="terminal-header">
      <div class="header-top">
        <div class="sys-id">LOGPARSE<span class="blink">_</span></div>
        <div class="header-meta">
          <span class="meta-tag">MEM://64K</span>
          <span class="meta-tag">STATUS:<span class="status-ok">■ ONLINE</span></span>
          <span class="meta-tag" id="headerClock">00:00:00</span>
        </div>
      </div>
      <div class="header-sub">// EMBEDDED DEVICE LOG ANALYSIS SYSTEM &nbsp;|&nbsp; v2.1.0 &nbsp;|&nbsp; SECURE CHANNEL EST.</div>
    </header>

    <main class="terminal-body">

      <section class="module">
        <div class="module-label">▸ REMOTE_FETCH</div>
        <div class="fetch-area">
          <input id="snInput" placeholder="SN e.g. NSBB22100D59F7B" aria-label="Device SN">
          <input id="vinInput" placeholder="VIN e.g. LSV2BDDG6SN016885" aria-label="Vehicle VIN">
          <input type="date" id="startInput" aria-label="Start date (YYYY-MM-DD)">
          <input type="date" id="endInput" aria-label="End date (YYYY-MM-DD)">
          <button id="queryBtn">
            <span class="btn-arrow">⤓</span>
            <span id="queryLabel">FETCH</span>
          </button>
        </div>
      </section>

      <section class="module">
        <div class="module-label">▸ INPUT_STREAM</div>
        <div class="upload-area">
          <label class="file-drop" for="fileInput">
            <span class="file-icon">◈</span>
            <span class="file-text" id="fileText">SELECT LOG FILE &nbsp;(.TXT &nbsp;.LOG &nbsp;.CSV)</span>
          </label>
          <input type="file" id="fileInput" accept=".txt,.log,.csv" aria-label="Log file input">
          <button id="parseBtn">
            <span class="btn-arrow">▶</span>
            <span id="btnLabel">EXECUTE</span>
          </button>
        </div>
      </section>

      <div class="status-bar error-bar" id="errorMsg" hidden>
        <span class="bar-prefix err-prefix">ERR::</span>
        <span id="errorText"></span>
      </div>

      <div class="status-bar sn-bar" id="snBanner" hidden>
        <span class="bar-prefix sn-prefix">DEVICE_ID</span>
        <span class="bar-sep">::</span>
        <span id="snValue" class="sn-value">—</span>
        <span class="sn-acq">● ACQUIRED</span>
      </div>

      <section class="search-row">
        <div class="search-wrap">
          <span class="search-prompt">&gt;_</span>
          <input type="search" id="search" placeholder="FILTER EVENTS... (COMMA-SEPARATED TERMS)" disabled>
        </div>
        <div class="rec-count" id="recCount"></div>
        <div class="zoom-wrap">
          <span class="zoom-icon">A</span>
          <input type="range" id="zoomSlider" min="10" max="22" step="0.5" value="12.5" aria-label="Table text size">
          <span class="zoom-icon" style="font-size:17px">A</span>
        </div>
      </section>

      <section class="data-section">
        <div class="module-label">▸ EVENT_LOG</div>
        <div class="table-wrap">
          <table id="resultsTable">
            <thead>
              <tr>
                <th class="col-num">#</th>
                <th>TIMESTAMP</th>
                <th>EVT_ID</th>
                <th>MESSAGE</th>
              </tr>
            </thead>
            <tbody id="resultsBody"></tbody>
          </table>
        </div>
      </section>

    </main>

    <footer class="terminal-footer">
      <span>SYS://LOGPARSE</span>
      <span class="f-sep">◈</span>
      <span>SECURE_CH_ACTIVE</span>
      <span class="f-sep">◈</span>
      <span id="footerClock">00:00:00 UTC</span>
    </footer>

  </div>

  <script src="app.js"></script>
</body>
</html>
